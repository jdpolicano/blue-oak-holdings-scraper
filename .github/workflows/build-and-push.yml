name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "src/**"
      - "package*.json"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build and push Docker image to ECR
        id: build
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION=us-east-1
          REPO_NAME="blue-oak-holdings/scraper"

          aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com

          docker buildx create --use || true
          docker buildx build --platform linux/amd64 \
            -t $ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$REPO_NAME:latest \
            --push .

          IMAGE_DIGEST=$(aws ecr describe-images \
            --repository-name "$REPO_NAME" \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          IMAGE_URI="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$REPO_NAME@$IMAGE_DIGEST"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Trigger deploy workflow
        uses: peter-evans/workflow-dispatch@v2
        with:
          workflow: deploy-stack.yml
          ref: main
          inputs:
            image_uri: ${{ steps.build.outputs.image_uri }}
