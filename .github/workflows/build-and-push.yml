name: Build and Push Docker Image

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Typecheck AWS ops CLI
        run: npx tsc --noEmit --target esnext --module nodenext --moduleResolution nodenext --strict --types node scripts/aws-ops.ts

      - name: Build and push Docker image to ECR
        id: build
        run: |
          docker buildx create --use || true
          IMAGE_TAG="prod-${GITHUB_SHA::7}"
          BUILD_OUTPUT=$(npm --silent run aws:ops -- image build-push --tag "$IMAGE_TAG")
          IMAGE_URI=$(printf '%s' "$BUILD_OUTPUT" | jq -r '.imageUri')
          TAG_URI=$(printf '%s' "$BUILD_OUTPUT" | jq -r '.tagUri')

          if [ -z "$IMAGE_URI" ] || [ "$IMAGE_URI" = "null" ]; then
            echo "aws:ops did not return imageUri" >&2
            printf '%s\n' "$BUILD_OUTPUT" >&2
            exit 1
          fi

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "TAG_URI=$TAG_URI" >> $GITHUB_ENV
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "tag_uri=$TAG_URI" >> $GITHUB_OUTPUT
          printf '%s\n' "$BUILD_OUTPUT"

      - name: Trigger deployment (optional)
        if: success()
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT }} # Personal Access Token, not GITHUB_TOKEN
          repository: ${{ github.repository }}
          event-type: deploy-scraper
          client-payload: |
            {
              "image_uri": "${{ steps.build.outputs.image_uri }}"
            }
