name: Deploy Lambda and Layer

on:
  workflow_dispatch: {} # Manual trigger

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build and Push Docker Image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          docker build -t blue-oak-holdings-scraper .
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com
          docker tag blue-oak-holdings-scraper:latest $ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/blue-oak-holdings/scraper:latest
          docker push $ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/blue-oak-holdings/scraper:latest

      # 2 Deploy CloudFormation stack
      - name: Deploy CloudFormation
        run: |
          aws cloudformation deploy \
            --template-file infra/lambda-chromium.yaml \
            --stack-name boh-lambda \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              SesFromAddress=${{ secrets.SES_FROM_ADDRESS }} \
              SesToAddresses=${{ secrets.SES_TO_ADDRESSES }}
