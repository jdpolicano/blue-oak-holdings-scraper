name: Deploy CloudFormation Stack

on:
  workflow_dispatch:
    inputs:
      image_uri:
        description: "ECR image URI with digest"
        required: true
  repository_dispatch:
    types: [deploy-scraper]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Typecheck AWS ops CLI
        run: npx tsc --noEmit --target esnext --module nodenext --moduleResolution nodenext --strict --types node scripts/aws-ops.ts

      - name: Determine image URI
        id: image
        env:
          INPUT_IMAGE_URI: ${{ github.event.inputs.image_uri }}
          PAYLOAD_IMAGE_URI: ${{ github.event.client_payload.image_uri }}
        run: |
          if [ -n "$INPUT_IMAGE_URI" ]; then
            IMAGE_URI="$INPUT_IMAGE_URI"
          elif [ -n "$PAYLOAD_IMAGE_URI" ]; then
            IMAGE_URI="$PAYLOAD_IMAGE_URI"
          else
            echo "Missing required image_uri. Provide workflow_dispatch input or repository_dispatch client_payload.image_uri." >&2
            exit 1
          fi

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE_URI"

      - name: Deploy CloudFormation
        run: |
          npm --silent run aws:ops -- deploy scheduled --image-uri "${{ steps.image.outputs.image_uri }}" --confirm-production
