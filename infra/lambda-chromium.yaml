AWSTemplateFormatVersion: "2010-09-09"
Description: "Headless scraping Lambda using Chromium layer, S3, and SES"

Parameters:
  ChromiumLayerArn:
    Type: String
    Description: ARN of the published Chromium Lambda layer
  SesFromAddress:
    Type: String
    Description: Verified SES email address to send from
  SesToAddresses:
    Type: String
    Description: Comma-separated recipient list

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-data"
      VersioningConfiguration:
        Status: Enabled

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub "${DataBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-scrape-handler"
      Role: !GetAtt LambdaRole.Arn
      Runtime: nodejs20.x
      Handler: dist/handler.handler
      Code:
        S3Bucket: boh-lambda-artifacts # or use aws cloudformation package
        S3Key: lambda.zip
      Timeout: 900
      MemorySize: 3008
      Layers:
        - !Ref ChromiumLayerArn
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref DataBucket
          S3_OBJECT_KEY: data/listings.csv
          SES_FROM_ADDRESS: !Ref SesFromAddress
          SES_TO_ADDRESSES: !Ref SesToAddresses

  SchedulerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt LambdaFunction.Arn

  # The actual schedule at 6:00pm ET (with DST handled)
  Daily6pmET:
    Type: AWS::Scheduler::Schedule
    Properties:
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: "cron(0 18 * * ? *)" # 6:00 pm local
      ScheduleExpressionTimezone: "America/New_York" # 👈 handles DST
      Target:
        Arn: !GetAtt LambdaFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LambdaFunction
      Principal: scheduler.amazonaws.com
      SourceArn: !GetAtt Daily6pmET.Arn

Outputs:
  LambdaName:
    Value: !Ref LambdaFunction
  BucketName:
    Value: !Ref DataBucket
